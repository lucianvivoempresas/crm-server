<!-- Teste Simples de UsuГЎrios -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de UsuГЎrios</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #0f172a; color: #e2e8f0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { color: #60a5fa; }
        .section { background: #1e293b; border: 1px solid #334155; padding: 20px; margin-bottom: 20px; border-radius: 6px; }
        button { background: #3b82f6; color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-size: 14px; margin: 5px 0; }
        button:hover { background: #2563eb; }
        button.danger { background: #ef4444; }
        button.success { background: #10b981; }
        .log { background: #0f172a; border: 1px solid #475569; padding: 15px; border-radius: 4px; max-height: 300px; overflow-y: auto; margin-top: 10px; font-size: 12px; line-height: 1.6; }
        .log-entry { padding: 4px 0; border-bottom: 1px solid #334155; }
        .success { color: #10b981; }
        .error { color: #ef4444; }
        .info { color: #94a3b8; }
        .warning { color: #f59e0b; }
    </style>
</head>
<body>
    <div class="container">
        <h1>рџ§Є Teste de Funcionalidade de UsuГЎrios</h1>

        <div class="section">
            <h2>Status da SessГЈo</h2>
            <button onclick="verificarSessao()">Verificar SessГЈo</button>
            <button onclick="limparSessao()" class="danger">Limpar SessГЈo</button>
            <div id="session-log" class="log"></div>
        </div>

        <div class="section">
            <h2>Teste de BotГµes</h2>
            <button onclick="testarBotaoNovoUsuario()" class="success">Simular: Clicar em "Novo Vendedor"</button>
            <button onclick="testarBotaoEditar()" class="success">Simular: Clicar em "Editar"</button>
            <div id="buttons-log" class="log"></div>
        </div>

        <div class="section">
            <h2>Teste de API</h2>
            <button onclick="testarAPIGetUsuarios()">GET /api/usuarios</button>
            <button onclick="testarAPICriarUsuario()">POST /api/usuarios (criar)</button>
            <div id="api-log" class="log"></div>
        </div>

        <div class="section">
            <h2>Reset e Retorno ao Login</h2>
            <button onclick="retornarAoLogin()" class="danger">Voltar ao Login</button>
            <div id="reset-log" class="log"></div>
        </div>
    </div>

    <script>
        function log(elementId, message, type = 'info') {
            const el = document.getElementById(elementId);
            if (!el) return;
            
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = message;
            el.appendChild(entry);
            el.scrollTop = el.scrollHeight;
        }

        function clearLog(elementId) {
            const el = document.getElementById(elementId);
            if (el) el.innerHTML = '';
        }

        async function verificarSessao() {
            clearLog('session-log');
            const session = localStorage.getItem('CRM_USER_SESSION');
            
            if (!session) {
                log('session-log', 'вќЊ Nenhuma sessГЈo encontrada', 'error');
                log('session-log', 'VocГЄ precisa estar logado para usar este teste', 'warning');
                return;
            }

            try {
                const user = JSON.parse(session);
                log('session-log', `вњ… SessГЈo encontrada!`, 'success');
                log('session-log', `Name: ${user.nome}`, 'info');
                log('session-log', `Email: ${user.email}`, 'info');
                log('session-log', `Perfil: ${user.perfil}`, 'info');
                
                if (user.perfil === 'master') {
                    log('session-log', `вњ… VocГЄ Г© MASTER - pode gerenciar usuГЎrios`, 'success');
                } else {
                    log('session-log', `вљ пёЏ VocГЄ Г© ${user.perfil.toUpperCase()} - funcionalidade limitada`, 'warning');
                }
            } catch (e) {
                log('session-log', `вќЊ Erro ao parse: ${e.message}`, 'error');
            }
        }

        function limparSessao() {
            clearLog('session-log');
            localStorage.clear();
            log('session-log', 'вњ… localStorage limpo!', 'success');
            log('session-log', 'Recarregando em 2 segundos...', 'info');
            setTimeout(() => location.reload(), 2000);
        }

        async function testarBotaoNovoUsuario() {
            clearLog('buttons-log');
            log('buttons-log', 'рџ”Ќ Verificando disponibilidade da funГ§ГЈo abrirModalUsuario...', 'info');
            
            if (typeof abrirModalUsuario === 'function') {
                log('buttons-log', `вњ… FunГ§ГЈo abrirModalUsuario estГЎ disponГ­vel`, 'success');
                log('buttons-log', `Chamando abrirModalUsuario(null)...`, 'info');
                try {
                    abrirModalUsuario(null);
                    log('buttons-log', `вњ… Modal de novo usuГЎrio aberto!`, 'success');
                    log('buttons-log', `Procure pelo modal na pГЎgina principal`, 'info');
                } catch (e) {
                    log('buttons-log', `вќЊ Erro: ${e.message}`, 'error');
                }
            } else {
                log('buttons-log', `вќЊ FunГ§ГЈo abrirModalUsuario NГѓO ENCONTRADA`, 'error');
            }
        }

        async function testarBotaoEditar() {
            clearLog('buttons-log');
            log('buttons-log', 'рџ”Ќ Buscando usuГЎrios para ediГ§ГЈo...', 'info');
            
            try {
                const response = await fetch('/api/usuarios');
                const usuarios = await response.json();
                
                if (usuarios.length === 0) {
                    log('buttons-log', 'вќЊ Nenhum usuГЎrio encontrado', 'error');
                    return;
                }

                const usuario = usuarios[0];
                log('buttons-log', `вњ… Encontrado usuГЎrio: ${usuario.nome}`, 'success');
                log('buttons-log', `Chamando abrirModalUsuario(${usuario.id})...`, 'info');
                
                if (typeof abrirModalUsuario === 'function') {
                    abrirModalUsuario(usuario.id);
                    log('buttons-log', `вњ… Modal de ediГ§ГЈo aberto!`, 'success');
                } else {
                    log('buttons-log', `вќЊ FunГ§ГЈo nГЈo encontrada`, 'error');
                }
            } catch (e) {
                log('buttons-log', `вќЊ Erro: ${e.message}`, 'error');
            }
        }

        async function testarAPIGetUsuarios() {
            clearLog('api-log');
            log('api-log', 'рџ“Ў GET /api/usuarios...', 'info');
            
            try {
                const response = await fetch('/api/usuarios');
                const usuarios = await response.json();
                
                log('api-log', `вњ… Retornou ${usuarios.length} usuГЎrio(s)`, 'success');
                usuarios.forEach(u => {
                    log('api-log', `  - ${u.nome} (${u.email}) [${u.perfil}]`, 'info');
                });
            } catch (e) {
                log('api-log', `вќЊ Erro: ${e.message}`, 'error');
            }
        }

        async function testarAPICriarUsuario() {
            clearLog('api-log');
            const newUser = {
                nome: `Teste ${Date.now()}`,
                email: `teste${Date.now()}@empresa.com`,
                senha: 'teste123',
                perfil: 'vendedor',
                ativo: 1
            };
            
            log('api-log', `рџ“Ў POST /api/usuarios com dados:`, 'info');
            log('api-log', `  nome: ${newUser.nome}`, 'info');
            log('api-log', `  email: ${newUser.email}`, 'info');
            
            try {
                const response = await fetch('/api/usuarios', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newUser)
                });
                
                const result = await response.json();
                
                if (result.success || result.id) {
                    log('api-log', `вњ… UsuГЎrio criado com ID: ${result.id}`, 'success');
                } else {
                    log('api-log', `вќЊ Erro: ${result.error}`, 'error');
                }
            } catch (e) {
                log('api-log', `вќЊ Erro: ${e.message}`, 'error');
            }
        }

        function retornarAoLogin() {
            clearLog('reset-log');
            log('reset-log', 'рџ”„ Limpando e voltando ao login...', 'warning');
            localStorage.clear();
            log('reset-log', 'вњ… Redirecionando em 2 segundos...', 'success');
            setTimeout(() => location.href = 'http://localhost:3000', 2000);
        }

        // Verificar sessГЈo ao carregar
        window.addEventListener('load', () => {
            verificarSessao();
        });
    </script>
</body>
</html>
